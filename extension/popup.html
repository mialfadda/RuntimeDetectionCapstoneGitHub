<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUNTIME MALWEB DETECTOR</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <h1>RUNTIME MALWEB DETECTOR</h1>
      <div class="status-dot" id="status-dot"></div>
    </div>

    <!-- Login form (shown when not logged in) -->
    <div id="login-section" class="login-form hidden">
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <button id="login-btn" class="btn primary">Sign In</button>
      <div id="login-error" class="error hidden"></div>
    </div>

    <!-- Main view (shown when logged in) -->
    <div id="main-section" class="hidden" style="display:none;flex-direction:column;flex:1;">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="overview">Overview</button>
        <button class="tab" data-tab="alerts">Alerts</button>
        <button class="tab" data-tab="processes">Processes</button>
        <button class="tab" data-tab="settings">Settings</button>
      </div>

      <!-- Overview tab -->
      <div class="tab-content active" id="tab-overview">
        <div class="section">
          <div id="user-info" class="user-info"></div>
        </div>
        <div class="section">
          <div class="scan-box">
            <input type="url" id="scan-url" placeholder="Enter URL to scan..." />
            <button id="scan-btn" class="btn primary">Scan</button>
          </div>
          <div id="scan-result" class="result hidden"></div>
        </div>
        <div class="section" id="last-scan-section" style="display:none;">
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;font-weight:600;">Last auto-scan</div>
          <div id="last-scan-info" style="font-size:12px;"></div>
        </div>
      </div>

      <!-- Alerts tab -->
      <div class="tab-content" id="tab-alerts">
        <button class="back-btn" data-back-to="overview">&larr; Overview</button>
        <div class="section">
          <div id="alerts-list">
            <div class="empty">No alerts yet. Browse the web to start scanning.</div>
          </div>
        </div>
        <div class="section hidden" id="alert-detail">
          <button class="back-btn" id="alert-detail-back">&larr; Back</button>
          <div id="alert-detail-body"></div>
        </div>
      </div>

      <!-- Processes tab -->
      <div class="tab-content" id="tab-processes">
        <button class="back-btn" data-back-to="overview">&larr; Overview</button>
        <div class="section">
          <div id="processes-list">
            <div class="process-item">
              <span class="process-name">URL Scanner</span>
              <span class="process-status">Active</span>
            </div>
            <div class="process-item">
              <span class="process-name">Runtime Monitor</span>
              <span class="process-status">Active</span>
            </div>
            <div class="process-item">
              <span class="process-name">Threat Database</span>
              <span class="process-status">Synced</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Settings tab -->
      <div class="tab-content" id="tab-settings">
        <button class="back-btn" data-back-to="overview">&larr; Back</button>
        <div class="section">
          <div style="font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:6px;">API Base URL</div>
          <input type="text" id="setting-api-base" placeholder="https://..." style="width:100%;margin-bottom:6px;" />
          <button id="setting-api-save" class="btn secondary" style="width:100%;">Save API URL</button>
          <div id="setting-api-msg" style="font-size:11px;margin-top:4px;color:var(--text-muted);"></div>
        </div>
        <div class="section">
          <div class="setting-row">
            <span class="setting-label">Auto-scan on navigation</span>
            <label class="toggle"><input type="checkbox" id="setting-autoscan" checked /><span class="slider"></span></label>
          </div>
          <div class="setting-row">
            <span class="setting-label">Show warning overlay</span>
            <label class="toggle"><input type="checkbox" id="setting-overlay" checked /><span class="slider"></span></label>
          </div>
          <div class="setting-row">
            <span class="setting-label">Notifications</span>
            <label class="toggle"><input type="checkbox" id="setting-notif" checked /><span class="slider"></span></label>
          </div>
        </div>
        <div class="section">
          <button id="logout-btn" class="btn danger" style="width:100%">Log Out</button>
        </div>
      </div>

    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
